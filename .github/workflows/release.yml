name: Publish Package

on:
  push:
    branches:
      - main
    paths:
      - "packages/code-chunk/package.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing support
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check if version changed
        id: version-check
        run: |
          PACKAGE_NAME=$(jq -r '.name' packages/code-chunk/package.json)
          LOCAL_VERSION=$(jq -r '.version' packages/code-chunk/package.json)
          NPM_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL_VERSION" = "$NPM_VERSION" ]; then
            echo "Version $LOCAL_VERSION already published, skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing $LOCAL_VERSION (npm has $NPM_VERSION)"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Type check
        if: steps.version-check.outputs.changed == 'true'
        run: bun run type-check

      - name: Lint
        if: steps.version-check.outputs.changed == 'true'
        run: bun run lint

      - name: Build
        if: steps.version-check.outputs.changed == 'true'
        run: bun run build

      - name: Publish
        if: steps.version-check.outputs.changed == 'true'
        run: npm publish --access public --provenance
        working-directory: packages/code-chunk
